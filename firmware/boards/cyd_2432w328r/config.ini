; Shared settings for all CYD 2.8" resistive-touch variants.
; Source and include path point to the cyd_2432w328r folder for both envs.
[cyd_common]
board_build.partitions = firmware/partitions_4mb.csv
build_src_filter = ${env.build_src_filter} +<../boards/cyd_2432w328r>
build_flags =
	${env.build_flags}
	-Ifirmware/boards/cyd_2432w328r
lib_deps =
	${env.lib_deps}

; CYD-2432W328R / 2432S024R — backlight GPIO 27, Grove SDA GPIO 21, 55 MHz display SPI.
[env:cyd_2432w328r]
extends = cyd_common
board = cyd_2432w328r
build_flags =
	${cyd_common.build_flags}
	-DLCD_BL=27
	-DGROVE_SDA=21
	-DSPI_FREQUENCY=55000000
	-DSPI_READ_FREQUENCY=20000000

; CYD-2432S028 — same hardware, backlight GPIO 21, Grove SDA GPIO 27, 40 MHz display SPI.
[env:cyd_2432s028]
extends = cyd_common
board = cyd_2432s028
build_flags =
	${cyd_common.build_flags}
	-DLCD_BL=21
	-DGROVE_SDA=27
	-DSPI_FREQUENCY=40000000
	-DSPI_READ_FREQUENCY=16000000